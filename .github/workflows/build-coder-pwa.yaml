name: Build & Push coder-pwa (multi-arch, native runners) - GHCR

on:
  push:
    branches:
      - main
    paths:
      - "host-services/coder-pwa/**"
      - ".github/workflows/build-coder-pwa.yaml"
  workflow_dispatch:

jobs:
  build-and-push:
    uses: ./.github/workflows/build-image.yaml
    with:
      image_namespace: host-services
      image_name: coder-pwa
      dockerfile: host-services/coder-pwa/Dockerfile
    permissions:
      contents: read
      packages: write
