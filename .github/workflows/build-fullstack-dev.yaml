name: Build & Push fullstack-dev (multi-arch, native runners) - GHCR

on:
  push:
    branches:
      - main
    paths:
      - "workspace-images/fullstack-dev/**"
      - "workspace-images/shared/**"
      - "workspace-images/python-dev/python-init.sh"
      - ".github/workflows/build-fullstack-dev.yaml"
  workflow_dispatch:
  workflow_run:
    workflows: ["Build & Push nextjs-dev (multi-arch, native runners) - GHCR"]
    types:
      - completed
    branches:
      - main

jobs:
  build-and-push:
    uses: ./.github/workflows/build-image.yaml
    with:
      image_namespace: workspace-images
      image_name: fullstack-dev
      dockerfile: workspace-images/fullstack-dev/Dockerfile
    permissions:
      contents: read
      packages: write
